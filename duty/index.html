<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>抽值日生輪盤</title>
  <style>
    :root{
      --bg:#F4F6F7;
      --card:#FFFFFF;
      --ink:#1F2D3D;
      --muted:#607080;
      --line:#E5E9EF;
      --accent:#48C9B0;
      --accent2:#5DADE2;
      --danger:#E74C3C;
      --btn:#2C3E50;
      --btn2:#3B5166;
      --shadow: 0 10px 30px rgba(31,45,61,.10);
      --radius:16px;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    .wrap{
      max-width: 1080px;
      margin: 0 auto;
      padding: 18px 14px 40px;
    }
    .header{
      display:flex; align-items:center; justify-content:space-between;
      gap:12px; margin-bottom: 12px;
    }
    .title{display:flex; flex-direction:column; gap:4px;}
    h1{font-size:24px; margin:0; letter-spacing:.5px;}
    .sub{font-size:14px; color:var(--muted);}
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fbfcfd;
      font-size: 14px;
      color: var(--muted);
    }
    .pill strong{color:var(--ink); font-weight:800;}
    .card{
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .grid{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 12px;
    }
    @media (max-width: 940px){
      .grid{grid-template-columns:1fr;}
    }
    .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    label{
      display:block;
      font-size: 14px;
      color: var(--muted);
      margin: 4px 0 6px;
    }
    textarea{
      width: 100%;
      min-height: 88px;
      resize: vertical;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      outline: none;
      background: #fbfcfd;
      font-size: 14px;
      line-height: 1.4;
    }
    textarea:focus{border-color: rgba(93,173,226,.7); box-shadow: 0 0 0 3px rgba(93,173,226,.15);}
    .hint{
      font-size: 14px;
      color: var(--muted);
      margin-top: 6px;
    }
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      gap:8px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid transparent;
      background: var(--btn);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
      transition: transform .06s ease, background .15s ease, opacity .15s ease;
    }
    .btn:hover{background: var(--btn2);}
    .btn:active{transform: scale(.98);}
    .btn.secondary{
      background: #fff;
      color: var(--ink);
      border-color: var(--line);
    }
    .btn.secondary:hover{background:#f7f9fb;}
    .btn.danger{background: var(--danger); color:white;}
    .btn:disabled{opacity:.45; cursor:not-allowed; transform:none;}
    .toggle{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
    .radio{
      display:inline-flex; align-items:center; gap:8px;
      padding: 9px 10px;
      border-radius: 12px;
      border:1px solid var(--line);
      background:#fbfcfd;
      cursor:pointer;
      user-select:none;
      font-size:14px;
      color:var(--ink);
    }
    .radio input{accent-color: var(--accent2);}

    .wheels{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }
    @media (max-width: 940px){
      .wheels{grid-template-columns:1fr;}
    }
    .wheelCard{
      background:#fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
    }
    .wheelHead{
      display:flex; align-items:center; justify-content:space-between;
      gap: 8px; margin-bottom: 8px;
    }
    .wheelHead .name{font-weight:900; letter-spacing:.3px;}
    .wheelHead .meta{font-size: 14px; color: var(--muted);}
    canvas{
      width: 100%;
      height: auto;
      display:block;
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
      border: 1px solid var(--line);
    }

    .status{
      margin-top: 12px;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      flex-wrap:wrap;
    }
    .status .big{
      font-size: 18px;
      font-weight: 900;
      letter-spacing: .4px;
      color: var(--ink);
    }
    .status .small{
      font-size: 14px;
      color: var(--muted);
    }
    .chip{
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(72,201,176,.12);
      color: #136f61;
      border: 1px solid rgba(72,201,176,.25);
      font-size: 14px;
      font-weight: 800;
    }

    .logCard{
      margin-top: 12px;
      background:#fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
    }
    .logHead{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px; flex-wrap:wrap;
      margin-bottom: 8px;
    }
    .logHead .ttl{font-weight:900;}
    table{
      width:100%;
      border-collapse:collapse;
      font-size: 14px;
    }
    th,td{
      border-bottom: 1px solid var(--line);
      padding: 8px 6px;
      text-align:left;
      vertical-align:top;
    }
    th{color:var(--muted); font-weight:900; font-size:14px;}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;}
    .empty{padding: 10px 0; color: var(--muted); font-size: 14px;}
  

    .btn.success{background:var(--accent); color:white;}
    .btn.success:hover{filter:brightness(.98);}
    #sysState.finished{color:var(--danger); font-weight:900;}
    .btn.csvReady{background:var(--accent2); color:var(--danger); font-weight:900;}
    .blink{animation:blink 1s steps(1,end) infinite;}
    @keyframes blink{50%{filter:brightness(1.25);} }
    

#resultText{font-size:18px; font-weight:800;}
#resultSub{font-size:14px;}
</style>

</head>

<body>
<div class="wrap">
  <div class="header">
    <div class="title">
      <h1>抽值日生輪盤</h1>
      <div class="sub"></div>
    </div>
    <div class="row">
      <span class="pill">日期總數：<strong id="dateTotal">0</strong></span>
      <span class="pill">剩餘日期：<strong id="dateLeft">0</strong></span>
      <span class="pill">值日生池：<strong id="memberLeft">0</strong></span>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <div class="toggle" id="modeToggle">
          <label class="radio">
            <input type="radio" name="mode" value="manual" checked />
            手動模式
          </label>
          <label class="radio">
            <input type="radio" name="mode" value="auto" />
            自動模式（快速動畫）
          </label>
        </div>
        <div class="row">
          <button class="btn danger" id="btnReset">重置（清空紀錄）</button>
          <button class="btn success" id="btnUnlockAudio" title="若手機/LINE阻擋音效，先點此解鎖">解鎖音效</button>
        </div>
      </div>

      <div style="margin-top:10px;">
        <label>⭐ 值日生名單（每行一個 / 逗號分隔皆可）</label>
        <textarea id="inputMembers" placeholder="例：小明 John 鈴木さん"></textarea>
        <div class="hint">人數少於日期時，抽完一輪會自動重置值日生池（日期不重置）。</div>
      </div>

      <div style="margin-top:10px;">
        <label>📅 值日生日期 </label>
        <textarea id="inputDates"></textarea>
      </div>

      <div class="row" style="margin-top:10px;">
        <button class="btn" id="btnLock">鎖定名單</button>
        <button class="btn success" id="btnUnlock">解除鎖定</button>
        <span class="pill">狀態：<strong id="sysState">INIT</strong></span>
        <span class="pill">模式：<strong id="modeState">manual</strong></span>
      </div>
    </div>

    <div class="card">
      <div class="row" style="margin-top:2px;">
        <span class="pill">手動：抽值日生 → 抽日期（兩輪皆金色閃爍）</span>
        <span class="pill">自動：按「自動開始」跑完（靜音＋不閃爍）</span>
      </div>

      <div class="row" style="margin-top:10px;">
        <button class="btn" id="btnSpinMember">抽值日生</button>
        <button class="btn" id="btnSpinDate">抽日期</button>
        <button class="btn" id="btnAutoStart">自動開始或中斷</button>
        <button class="btn secondary" id="btnCsv">抽籤紀錄 CSV</button>
      </div>

      <div class="status">
        <div>
          <div class="big" id="resultText">尚未開始</div>
          <div class="small" id="resultSub">請先鎖定名單</div>
        </div>
        <div class="row">
          <span class="chip" id="chipLocked">未鎖定</span>
          <span class="chip" id="chipAuto">自動未執行</span>
        </div>
      </div>

    </div>
  </div>

  <div class="wheels">
    <div class="wheelCard">
      <div class="wheelHead">
        <div class="name">⭐ 值日生輪盤</div>
        <div class="meta">切分：<span id="memberSlices">0</span>｜選中：<span id="memberPick" class="mono">-</span></div>
      </div>
      <canvas id="memberCanvas" width="600" height="600"></canvas>
    </div>

    <div class="wheelCard">
      <div class="wheelHead">
        <div class="name">📅 日期輪盤</div>
        <div class="meta">切分：<span id="dateSlices">0</span>｜選中：<span id="datePick" class="mono">-</span></div>
      </div>
      <canvas id="dateCanvas" width="600" height="600"></canvas>
    </div>
  </div>

  <div class="logCard">
    <div class="logHead">
      <div class="ttl">抽籤紀錄</div>
      <div class="row">
        <span class="pill">紀錄筆數：<strong id="logCount">0</strong></span>
      </div>
    </div>
    <div id="logEmpty" class="empty">尚無紀錄</div>
    <div style="overflow:auto;">
      <table id="logTable" style="display:none;">
        <thead>
          <tr>
            <th style="min-width:120px;">時間</th>
            <th style="min-width:140px;">值日生</th>
            <th style="min-width:140px;">日期</th>
          </tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
/* =====================================================
   Project : 抽值日生輪盤
   Version : v3.0 (Stable)
   Author  : 李明隆/ Anderson Lee
   Final   : 2026-02-11
   Notes   : INIT 藍色圓 / 自動中斷 / localStorage / PDF 下載
   ===================================================== */

/** =========================
 *  固定日期（紅字版 21 次）
 *  ========================= */
const DUTY_DATES = [
  "2/22",
  "3/15","3/29",
  "4/12","4/26",
  "5/3","5/17",
  "6/7","6/21",
  "7/5","7/19",
  "8/2","8/16",
  "9/6","9/20",
  "10/4","10/18",
  "11/1","11/15",
  "12/6","12/20"
];

/** =========================
 *  localStorage Key
 *  ========================= */
const LS_KEY_DATES = "duty_dates";
const LS_KEY_MEMBERS = "duty_members";

/** =========================
 *  工具
 *  ========================= */
function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }
function easeOutCubic(t){ return 1 - Math.pow(1 - t, 3); }

function parseLines(text){
  const raw = (text||"").replace(/\r/g,"\n");
  // 支援：換行 / 逗號 / 中文逗號 / 空格
  const parts = raw.split(/[\n,，\s]+/).map(s=>s.trim()).filter(Boolean);
  const seen = new Set(), out = [];
  for (const p of parts){
    if(!seen.has(p)){ seen.add(p); out.push(p); }
  }
  return out;
}

function nowStamp(){
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,"0");
  const mm = String(now.getMinutes()).padStart(2,"0");
  const ss = String(now.getSeconds()).padStart(2,"0");
  return `${hh}:${mm}:${ss}`; // 例如 18:24:06
}

function escapeHtml(s){
  return (s??"").toString()
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function canSwitchMode(){
  // 允許在 AUTO_RUNNING 中切換（用來中途打斷自動），但旋轉中（SPIN_*）禁止
  return !["SPIN_MEMBER","SPIN_DATE"].includes(state.system);
}
function isBusy(){
  return ["SPIN_MEMBER","SPIN_DATE"].includes(state.system);
}

/** =========================
 *  音效（同姓名抽籤輪盤路徑）
 *  BlessingCards128/audio/
 *  duty/ 是子資料夾，所以用 ../audio/xxx.mp3
 *  ========================= */
let audioUnlocked = false;
let drumAudio = null;
let dunAudio = null;
let audioStopTimer = null;

function ensureAudio(){
  if(!drumAudio){
    drumAudio = new Audio("../audio/drum.mp3");
    drumAudio.preload = "auto";
  }
  if(!dunAudio){
    dunAudio = new Audio("../audio/dun.mp3");
    dunAudio.preload = "auto";
  }
}

function stopAllAudio(){
  try{
    if(audioStopTimer){ clearTimeout(audioStopTimer); audioStopTimer = null; }
    if(drumAudio){ drumAudio.pause(); drumAudio.currentTime = 0; }
    if(dunAudio){ dunAudio.pause(); dunAudio.currentTime = 0; }
  }catch(e){}
}

async function unlockAudio(){
  try{
    ensureAudio();
    // 用極短播放解鎖（兩個都解鎖）
    drumAudio.volume = 0.001;
    await drumAudio.play();
    drumAudio.pause(); drumAudio.currentTime = 0;
    drumAudio.volume = 1;

    dunAudio.volume = 0.001;
    await dunAudio.play();
    dunAudio.pause(); dunAudio.currentTime = 0;
    dunAudio.volume = 1;

    audioUnlocked = true;
    setResultSub("音效已解鎖（若仍無聲，請再點一次）");
  }catch(e){
    audioUnlocked = false;
    setResultSub("音效仍可能被阻擋（請在同頁面再點一次）");
  }
}

function playAudioLimited(which, ms){
  // 自動模式：必須靜音
  if(state.mode === "auto") return;
  ensureAudio();
  stopAllAudio();

  const a = which === "drum" ? drumAudio : dunAudio;
  try{
    a.currentTime = 0;
    a.play().catch(()=>{});
    audioStopTimer = setTimeout(()=>{
      try{ a.pause(); a.currentTime = 0; }catch(e){}
      audioStopTimer = null;
    }, ms);
  }catch(e){}
}

/** =========================
 *  狀態
 *  ========================= */
const state = {
  locked: false,
  mode: "manual",
  system: "INIT",

  // 固定清單（不刪除；用 used* 來做灰化與避免重複抽取）
  members: [],
  dates: [],

  usedMembers: new Set(),   // 本輪已抽過的值日生
  usedDates: new Set(),     // 已分配過的日期（21 次）

  selectedMember: null,
  selectedDate: null,

  // 自動流程中斷旗標（允許中途打斷）
  autoAbort: false,

  logs: [],
  csvDownloaded: false,

  memberWheel: {
    angle: 0,
    spin: null,
    selectedIndex: -1,
    highlight: false,
    blink: true
  },
  dateWheel: {
    angle: 0,
    spin: null,
    selectedIndex: -1,
    highlight: false,
    blink: true
  }
};

/** =========================
 *  DOM
 *  ========================= */
const el = {
  dateTotal: document.getElementById("dateTotal"),
  dateLeft: document.getElementById("dateLeft"),
  memberLeft: document.getElementById("memberLeft"),

  inputMembers: document.getElementById("inputMembers"),
  inputDates: document.getElementById("inputDates"),

  btnLock: document.getElementById("btnLock"),
  btnUnlock: document.getElementById("btnUnlock"),
  btnReset: document.getElementById("btnReset"),
  btnUnlockAudio: document.getElementById("btnUnlockAudio"),

  btnSpinMember: document.getElementById("btnSpinMember"),
  btnSpinDate: document.getElementById("btnSpinDate"),
  btnAutoStart: document.getElementById("btnAutoStart"),
  btnCsv: document.getElementById("btnCsv"),

  sysState: document.getElementById("sysState"),
  modeState: document.getElementById("modeState"),
  chipLocked: document.getElementById("chipLocked"),
  chipAuto: document.getElementById("chipAuto"),

  resultText: document.getElementById("resultText"),
  resultSub: document.getElementById("resultSub"),

  memberCanvas: document.getElementById("memberCanvas"),
  dateCanvas: document.getElementById("dateCanvas"),

  memberSlices: document.getElementById("memberSlices"),
  dateSlices: document.getElementById("dateSlices"),
  memberPick: document.getElementById("memberPick"),
  datePick: document.getElementById("datePick"),

  logCount: document.getElementById("logCount"),
  logEmpty: document.getElementById("logEmpty"),
  logTable: document.getElementById("logTable"),
  logBody: document.getElementById("logBody"),

  modeToggle: document.getElementById("modeToggle")
};

/** =========================
 *  匯出 CSV（Excel 100% 不亂碼版）
 *  ========================= */
function exportCsv(){
  if(!state.logs.length) return;

  const isWindows = /Windows/i.test(navigator.userAgent);

  // Windows：用 Tab 分隔（TSV）+ UTF-16LE（Excel 雙擊最穩）
  // 非 Windows：用逗號（CSV）+ UTF-8 BOM（Sheets/手機最穩）
  const sep = isWindows ? "\t" : ",";
  const ext = isWindows ? "tsv" : "csv";
  const filename = `抽值日生輪盤_抽籤紀錄.${ext}`;

  // header
  const header = ["時間","模式","值日生","日期"];

  // rows：建議 mode 直接用 item.mode（你 log 裡應該已存 手動/自動）
  const rows = state.logs.map(item => ([
    item.time ?? "",
    item.mode ?? "",
    item.member ?? "",
    item.date ?? ""
  ]));

  // Windows Excel：加 sep=TAB 行（可提升分欄穩定）
  let text = "";
  if(isWindows) text += "sep=\t\r\n";

  // 組內容（TSV/CSV 都用同一套 escape）
  text += [header, ...rows]
    .map(cols => cols.map(v => escapeCell(v, sep)).join(sep))
    .join("\r\n");

  let blob;
  if(isWindows){
    // UTF-16LE + BOM
    const bytes = toUTF16LEBytesWithBOM(text);
    blob = new Blob([bytes], { type: "text/tab-separated-values" });
  }else{
    // UTF-8 + BOM
    const bytes = toUTF8BytesWithBOM(text);
    blob = new Blob([bytes], { type: "text/csv;charset=utf-8;" });
  }

  downloadBlob(blob, filename);

  state.csvDownloaded = true;
  updateButtons();
}

// === helpers ===

function escapeCell(v, sep){
  const s = String(v ?? "");
  // TSV：主要要處理換行與引號；CSV：還要處理逗號
  const needQuote = /["\r\n]/.test(s) || (sep === "," && s.includes(","));
  if(!needQuote) return s;
  return `"${s.replace(/"/g,'""')}"`;
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function toUTF8BytesWithBOM(str){
  const bom = new Uint8Array([0xEF,0xBB,0xBF]);
  const body = new TextEncoder().encode(str);
  const out = new Uint8Array(bom.length + body.length);
  out.set(bom, 0);
  out.set(body, bom.length);
  return out;
}

function toUTF16LEBytesWithBOM(str){
  // BOM: FF FE
  const buf = new ArrayBuffer(2 + str.length * 2);
  const view = new DataView(buf);
  view.setUint8(0, 0xFF);
  view.setUint8(1, 0xFE);
  for(let i=0;i<str.length;i++){
    view.setUint16(2 + i*2, str.charCodeAt(i), true); // true = little-endian
  }
  return new Uint8Array(buf);
}

/** =========================
 *  UI helpers
 *  ========================= */
function setResult(t){ el.resultText.textContent = t; }
function setResultSub(t){ el.resultSub.textContent = t; }

function setSystem(s){
  state.system = s;
  el.sysState.textContent = s;
  if(s === "FINISHED") el.sysState.classList.add("finished");
  else el.sysState.classList.remove("finished");
  updateButtons();
}

function setMode(m){
  state.mode = m;
  el.modeState.textContent = m;
  el.chipAuto.textContent = (m === "auto") ? "自動模式已選擇" : "自動未執行";

  // 自動模式：立即靜音＋關閉閃爍
  if(m === "auto"){
    stopAllAudio();
    state.memberWheel.blink = false;
    state.dateWheel.blink = false;
  }else{
    state.memberWheel.blink = true;
    state.dateWheel.blink = true;
  }
  updateButtons();
}

function setLocked(v){
  state.locked = v;
  el.chipLocked.textContent = v ? "已鎖定" : "未鎖定";
  el.chipLocked.style.background = v ? "rgba(93,173,226,.12)" : "rgba(231,76,60,.10)";
  el.chipLocked.style.borderColor = v ? "rgba(93,173,226,.25)" : "rgba(231,76,60,.22)";
  el.chipLocked.style.color = v ? "#1c5b86" : "#a03a2d";
  updateButtons();
}

function updateCounters(){
  const dateLeft = Math.max(0, state.dates.length - state.usedDates.size);
  const memberLeft = Math.max(0, state.members.length - state.usedMembers.size);

/** =========================
 *  Canvas resize + draw
 *  ========================= */
function resizeCanvas(canvas){
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  const size = Math.min(canvas.clientWidth, canvas.clientWidth);
  canvas.style.height = size + "px";
  canvas.width  = Math.round(size * dpr);
  canvas.height = Math.round(size * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

const THEME_MEMBER = {
  c1: "rgba(93,173,226,.85)",
  c2: "rgba(72,201,176,.80)",
  text: "#ffffff",
  center: "值日生"
};
const THEME_DATE = {
  c1: "rgba(93,173,226,.55)",
  c2: "rgba(244,246,247,1)",
  text: "rgba(31,45,61,.85)",
  center: "日期"
};

function drawWheel(canvas, labels, angle, theme, wheelState, nowMs){
  const ctx = canvas.getContext("2d");
  const size = canvas.clientWidth; // 已由 resizeCanvas() 強制成正方形
  const cx = size/2, cy = size/2;
  const r  = size * 0.46;          // 留邊距，避免看起來「不圓/被吃邊」

  ctx.clearRect(0,0,size,size);

  // ===== 空資料：單一圓(底色#5DADE2)＋內切線（3px 白線）=====
  if(!labels || labels.length === 0){
    // 外圈淡陰影
    ctx.beginPath();
    ctx.arc(cx,cy,r+10,0,Math.PI*2);
    ctx.fillStyle = "rgba(31,45,61,.04)";
    ctx.fill();

    // 主圓
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle = "#5DADE2";
    ctx.fill();

    // 內切線（白色 3px）
    ctx.beginPath();
    ctx.moveTo(cx - r, cy);
    ctx.lineTo(cx + r, cy);
    ctx.strokeStyle = "rgba(255,255,255,1)";
    ctx.lineWidth = 3;
    ctx.stroke();

    // 中心圓
    ctx.beginPath();
    ctx.arc(cx,cy,r*0.14,0,Math.PI*2);
    ctx.fillStyle = "#ffffff";
    ctx.fill();
    ctx.strokeStyle = "rgba(96,112,128,.25)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = "rgba(31,45,61,.75)";
    ctx.font = "900 14px system-ui, -apple-system, 'Noto Sans TC', sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(theme.center, cx, cy);
    return;
  }

  const n = labels.length;
  const step = Math.PI*2 / n;

  // blink factor（只影響手動：wheelState.blink=true）
  let blinkAlpha = 1;
  if(wheelState.highlight && wheelState.blink){
    const s = Math.sin(nowMs / 120);
    blinkAlpha = 0.55 + 0.45 * (s*0.5 + 0.5);
  }

  // 外圈淡陰影
  ctx.beginPath();
  ctx.arc(cx,cy,r+10,0,Math.PI*2);
  ctx.fillStyle = "rgba(31,45,61,.04)";
  ctx.fill();

  for(let i=0;i<n;i++){
    const a0 = angle + i*step;
    const a1 = a0 + step;

    const label = labels[i];

    const isDate = (theme === THEME_DATE);
    const isUsed = isDate ? state.usedDates.has(label) : state.usedMembers.has(label);

    // slice
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,a0,a1,false);
    ctx.closePath();

    if(isUsed){
      ctx.fillStyle = "#E0E0E0"; // 整格灰色
    }else{
      ctx.fillStyle = (i%2===0) ? theme.c1 : theme.c2;
    }
    ctx.fill();

    // 內切白線（3px）
    ctx.strokeStyle = "rgba(255,255,255,.90)";
    ctx.lineWidth = 3;
    ctx.stroke();

    // label
    const mid = (a0+a1)/2;
    const tx = cx + Math.cos(mid) * (r*0.70);
    const ty = cy + Math.sin(mid) * (r*0.70);

    ctx.save();
    ctx.translate(tx,ty);
    ctx.rotate(mid + Math.PI/2);

    ctx.fillStyle = isUsed ? "rgba(31,45,61,.35)" : theme.text; // 文字淡化
    ctx.font = "800 14px system-ui, -apple-system, 'Noto Sans TC', sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    let t = label;
    if(t.length > 10) t = t.slice(0,10) + "…";
    ctx.fillText(t, 0, 0);

    ctx.restore();

    // highlight：金色外框＋（手動）閃爍
    if(wheelState.highlight && i === wheelState.selectedIndex){
      ctx.save();
      ctx.globalAlpha = blinkAlpha;

      ctx.shadowColor = "rgba(255,215,0,.85)";
      ctx.shadowBlur = 18;

      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,r,a0,a1,false);
      ctx.closePath();

      ctx.lineWidth = 6;
      ctx.strokeStyle = "rgba(255,215,0,1)";
      ctx.stroke();

      ctx.shadowBlur = 0;
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255,235,140,1)";
      ctx.stroke();

      ctx.restore();
    }
  }

  // center
  ctx.beginPath();
  ctx.arc(cx,cy,r*0.14,0,Math.PI*2);
  ctx.fillStyle = "#ffffff";
  ctx.fill();
  ctx.strokeStyle = "rgba(96,112,128,.25)";
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = "rgba(31,45,61,.75)";
  ctx.font = "900 14px system-ui, -apple-system, 'Noto Sans TC', sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(theme.center, cx, cy);
}

function redrawAll(nowMs){
  resizeCanvas(el.memberCanvas);
  resizeCanvas(el.dateCanvas);

  // 🔥 未鎖定時不要顯示切片（回到藍色圓 INIT 畫面）
  const memberLabels = state.locked ? state.members : [];
  const dateLabels   = state.locked ? state.dates   : [];

  drawWheel(
    el.memberCanvas,
    memberLabels,
    state.memberWheel.angle,
    THEME_MEMBER,
    state.memberWheel,
    nowMs
  );

  drawWheel(
    el.dateCanvas,
    dateLabels,
    state.dateWheel.angle,
    THEME_DATE,
    state.dateWheel,
    nowMs
  );
}

window.addEventListener("resize", ()=> redrawAll(performance.now()));

/** =========================
 *  無指針，但仍需「選中參考線」
 *  內部採用 12 點方向為選中線（不可見）
 *  ========================= */
function angleForIndexAtTop(index, n){
  const step = Math.PI * 2 / n;
  const top = -Math.PI/2;
  return top - (index + 0.5) * step;
}

function chooseRandomIndex(n){
  return Math.floor(Math.random() * n);
}

/** =========================
 *  絲滑停轉動畫（目標角度法）
 *  ========================= */
function chooseRandomIndexFrom(indices){
  const k = Math.floor(Math.random() * indices.length);
  return indices[k];
}

function startSpinToIndex(wheel, labels, durationMs, extraTurns, allowedIndices){
  const n = labels.length;
  if(n <= 0) return;

  const pool = (Array.isArray(allowedIndices) && allowedIndices.length>0)
    ? allowedIndices
    : Array.from({length:n}, (_,i)=>i);

  const idx = chooseRandomIndexFrom(pool);

  const baseTarget = angleForIndexAtTop(idx, n);
  const start = wheel.angle;

  const twoPi = Math.PI * 2;
// 固定轉 extraTurns 圈
let end = start + extraTurns * twoPi;

// 計算目標 index 對齊頂部的最終角度
const finalAngle = angleForIndexAtTop(idx, n);

// 計算需要補的微調角度（確保對齊）
const delta = ((finalAngle - end) % twoPi + twoPi) % twoPi;

end += delta;

  // ✅ 統一使用 spin
  wheel.spin = {
    startAngle: start,
    endAngle: end,
    startTime: performance.now(),
    duration: durationMs,
    idx
  };

  wheel.highlight = false;
  wheel.blink = false;
}

function updateWheelAnim(wheel, nowMs){
  const s = wheel.spin;
  if(!s) return false;

  const t = (nowMs - s.startTime) / s.duration;

  if(t >= 1){
    wheel.angle = s.endAngle;
    wheel.selectedIndex = s.idx;
    wheel.spin = null;
    return true;
  }

  const k = 1 - Math.pow(1 - t, 3);
  wheel.angle = s.startAngle + (s.endAngle - s.startAngle) * k;

  return false;
}

/** =========================
 *  高亮規則
 *  - 手動：兩輪抽中都要金色閃爍，直到「下一次抽值日生」才清除
 *  - 自動：不閃爍（blink=false），可保留基本高亮（外框不閃）
 *  ========================= */
function clearHighlights(){
  state.memberWheel.highlight = false;
  state.dateWheel.highlight = false;
  state.memberWheel.selectedIndex = -1;
  state.dateWheel.selectedIndex = -1;
}

/** =========================
 *  主循環
 *  ========================= */
let rafId = null;
function tick(nowMs){
  // anim update
  const mDone = updateWheelAnim(state.memberWheel, nowMs);
  const dDone = updateWheelAnim(state.dateWheel, nowMs);

  // 第一輪停下（值日生）
  if(mDone && state.system === "SPIN_MEMBER"){
    const idx = state.memberWheel.selectedIndex;
    state.selectedMember = state.members[idx] ?? null;
    el.memberPick.textContent = state.selectedMember ?? "-";

    // 手動：第一輪抽中要高亮閃爍；自動：不閃（blink=false）
    state.memberWheel.highlight = true;
    state.memberWheel.blink = (state.mode === "manual");
    setSystem("READY_DATE");
    setResult(`抽中值日生「${state.selectedMember}」`);
    setResultSub("請抽日期");
    updateCounters();
  }

  // 第二輪停下（日期）
  if(dDone && state.system === "SPIN_DATE"){
    const idx = state.dateWheel.selectedIndex;
    state.selectedDate = state.dates[idx] ?? null;
    el.datePick.textContent = state.selectedDate ?? "-";

    state.dateWheel.highlight = true;
    state.dateWheel.blink = false;
    finalizeAssignment(state.selectedMember, state.selectedDate);
  }

  redrawAll(nowMs);
  rafId = requestAnimationFrame(tick);
}

/** =========================
 *  抽取流程
 *  ========================= */
async function spinMember(){
  if(!state.locked) return;
  if(state.system !== "READY_MEMBER") return;

  const dateLeft = state.dates.length - state.usedDates.size;
  if(dateLeft <= 0){
    setSystem("FINISHED");
    setResult(`🎉 全年度值日生分配完成（${state.usedDates.size} / ${state.dates.length}）`);
    setResultSub("可下載 PDF，或按重置重新開始");
    stopAllAudio();
    return;
  }

  // 人池用完：自動重置（只影響灰化，不影響日期）
  if(state.members.length > 0 && state.usedMembers.size >= state.members.length){
    state.usedMembers.clear();
  }

  // 可抽的值日生索引（排除本輪已抽過）
  const allowed = [];
  for(let i=0;i<state.members.length;i++){
    if(!state.usedMembers.has(state.members[i])) allowed.push(i);
  }
  if(allowed.length === 0){
    state.usedMembers.clear();
    for(let i=0;i<state.members.length;i++) allowed.push(i);
  }

  // 下一位開始：清除兩輪高亮 + 停止音效
  clearHighlights();
  stopAllAudio();

  setSystem("SPIN_MEMBER");

  // 轉 8~10 圈，7 秒（與 drum 同步）
  const turns = 8 + Math.floor(Math.random()*3);

if(state.mode === "manual"){
  ensureAudio();

  drumAudio.currentTime = 0;
  drumAudio.play().catch(()=>{});

  // 👇 立刻開始轉盤
  startSpinToIndex(state.memberWheel, state.members, 7000, turns, allowed);
}else{
  startSpinToIndex(state.memberWheel, state.members, 7000, turns, allowed);
}
}

async function spinDate(){
  if(!state.locked) return;
  if(state.system !== "READY_DATE") return;

  const allowed = [];
  for(let i=0;i<state.dates.length;i++){
    if(!state.usedDates.has(state.dates[i])) allowed.push(i);
  }

  if(allowed.length === 0){
    setSystem("FINISHED");
    setResult(`🎉 全年度值日生分配完成（${state.usedDates.size} / ${state.dates.length}）`);
    setResultSub("可下載 PDF，或按重置重新開始");
    stopAllAudio();
    return;
  }

  stopAllAudio();
  setSystem("SPIN_DATE");

  const turns = 6 + Math.floor(Math.random()*3);

  if(state.mode === "manual"){
    ensureAudio();

    dunAudio.currentTime = 0;
    dunAudio.play().catch(()=>{});   // ❌ 不要 await

    startSpinToIndex(state.dateWheel, state.dates, 4000, turns, allowed);
  }else{
    startSpinToIndex(state.dateWheel, state.dates, 4000, turns, allowed);
  }
}

function finalizeAssignment(member, date){
  if(!member || !date){
    setResult("結果異常（member/date 為空）");
    setResultSub("請重置後再試");
    setSystem("READY_MEMBER");
    return;
  }

  // 防呆：日期不可重複
  if(state.usedDates.has(date)){
    setResult(`日期「${date}」已分配過（請再抽一次）`);
    setResultSub("（系統保護）");
    setSystem("READY_DATE");
    return;
  }

  // 中央顯示：依你需求「值日生「幾月幾日」」一行
  setResult(`值日生「${date}」`);
  setResultSub(`值日生：${member}`);

  // 記錄（時間後綴：單純顯示手動/自動；你選 C）
  const time = `${nowStamp()}（${state.mode === "auto" ? "自動" : "手動"}）`;
  state.logs.push({
  time,
  member,
  date,
  mode: state.mode === "auto" ? "自動" : "手動"
});
  renderLogs();

  // 標記：日期已用；值日生本輪已用（兩輪都「不刪除」，改灰化＋不可再抽）
  state.usedDates.add(date);
  state.usedMembers.add(member);

  // 清暫存（高亮要保留到下一次抽值日生才清除）
  state.selectedMember = null;
  state.selectedDate = null;

  updateCounters();

  // ✅ 完成判斷：只有「日期 21 次全部抽完」才 FINISHED（你選 A）
  if(state.usedDates.size >= state.dates.length){
    setSystem("FINISHED");
    setResult(`🎉 全年度值日生分配完成（${state.usedDates.size} / ${state.dates.length}）`);
    setResultSub("可下載 PDF，或按重置重新開始");
    el.chipAuto.textContent = "完成";
    stopAllAudio();
    return;
  }

  // 人池用完 → 重置本輪
  if(state.members.length > 0 && state.usedMembers.size >= state.members.length){
    state.usedMembers.clear();
  }

  // 回到第一輪
  setSystem("READY_MEMBER");
  setResult("請抽值日生");
  setResultSub(state.mode === "auto" ? "自動：按自動開始或中斷" : "手動：按抽值日生");
}

function abortAuto(reason){
  // 停止動畫
  state.autoAbort = true;
  try{
    state.memberWheel.spin = null;
    state.dateWheel.spin = null;
  }catch(e){}
  stopAllAudio();

  // 自動改回可操作狀態（不清資料、不清灰化）
  if(state.system === "FINISHED") return;

  el.chipAuto.textContent = "自動已中止";
  setResultSub(reason || "已中止自動流程");
  setSystem(state.locked ? "READY_MEMBER" : "INIT");
}

async function runAuto(){
  if(!state.locked) return;
  if(state.mode !== "auto") return;

  // 若已在自動中，按一次就中止（你要「中途打斷」）
  if(state.system === "AUTO_RUNNING"){
    abortAuto("已中止自動流程（手動接管）");
    return;
  }

  if(isBusy()) return;

  const dateLeft = state.dates.length - state.usedDates.size;
  if(dateLeft <= 0){
    setSystem("FINISHED");
    setResult(`🎉 全年度值日生分配完成（${state.usedDates.size} / ${state.dates.length}）`);
    setResultSub("可下載 CSV，或按重置重新開始");
    return;
  }

  state.autoAbort = false;

  // 自動模式：立即靜音
  stopAllAudio();
  el.chipAuto.textContent = "自動執行中…";

  setSystem("AUTO_RUNNING");

  while(true){
    if(state.autoAbort) break;

    const left = state.dates.length - state.usedDates.size;
    if(left <= 0) break;

    // 人池用完：重置本輪
    if(state.members.length > 0 && state.usedMembers.size >= state.members.length){
      state.usedMembers.clear();
    }

    // === 抽值日生（只抽未用）===
    const mAllowed = [];
    for(let i=0;i<state.members.length;i++){
      if(!state.usedMembers.has(state.members[i])) mAllowed.push(i);
    }
    if(mAllowed.length === 0){
      state.usedMembers.clear();
      for(let i=0;i<state.members.length;i++) mAllowed.push(i);
    }

    clearHighlights(); // 自動不需要上一筆閃爍殘留
    startSpinToIndex(state.memberWheel, state.members, 750, 3 + Math.floor(Math.random()*2), mAllowed);
    await waitAnimDone(state.memberWheel);
    if(state.autoAbort) break;

    state.selectedMember = state.members[state.memberWheel.selectedIndex] ?? null;
    state.memberWheel.highlight = true;
    state.memberWheel.blink = false;

    // === 抽日期（只抽未用）===
    const dAllowed = [];
    for(let i=0;i<state.dates.length;i++){
      if(!state.usedDates.has(state.dates[i])) dAllowed.push(i);
    }
    if(dAllowed.length === 0) break;

    startSpinToIndex(state.dateWheel, state.dates, 750, 3 + Math.floor(Math.random()*2), dAllowed);
    await waitAnimDone(state.dateWheel);
    if(state.autoAbort) break;

    state.selectedDate = state.dates[state.dateWheel.selectedIndex] ?? null;
    state.dateWheel.highlight = true;
    state.dateWheel.blink = (state.mode === "manual");
    finalizeAssignment(state.selectedMember, state.selectedDate);

    // finalizeAssignment 會把 system 拉回 READY_MEMBER；自動要維持 AUTO_RUNNING
    if(state.system === "FINISHED") break;
    state.system = "AUTO_RUNNING";
    el.sysState.textContent = "AUTO_RUNNING";

    await sleep(220);
  }

  if(state.autoAbort){
    // 已在 abortAuto() 做 UI；這裡只保護狀態
    state.system = state.locked ? "READY_MEMBER" : "INIT";
    el.sysState.textContent = state.system;
    updateButtons();
    return;
  }

  // 正常完成
  if(state.usedDates.size >= state.dates.length){
    setSystem("FINISHED");
    el.chipAuto.textContent = "完成";
  }else{
    // 途中自然結束（理論上不會），回到可操作
    setSystem("READY_MEMBER");
    el.chipAuto.textContent = "自動結束";
  }
}

function waitAnimDone(wheel){
  return new Promise(resolve=>{
    const check = ()=>{
      if(!wheel.spin) resolve();
      else requestAnimationFrame(check);
    };
    check();
  });
}

/** =========================
 *  Lock / Reset / PDF
 *  ========================= */
function lockLists(){
  const members = parseLines(el.inputMembers.value);
  const dates = parseLines(el.inputDates.value);

  if(members.length < 1){
    setResult("請先輸入值日生名單");
    setResultSub("可用：換行 / 逗號 / 空格 分隔");
    return;
  }

  if(dates.length < 1){
    setResult("日期清單為空");
    setResultSub("請填入日期（例：2/22 3/15 …）");
    return;
  }

  // 🔥 存進 state
  state.members = members;
  state.dates = dates;

  // 🔥 同步右上角日期總數
  el.dateTotal.textContent = String(dates.length);

  // 🔥 存入 localStorage
  localStorage.setItem(LS_KEY_DATES, el.inputDates.value);
  localStorage.setItem(LS_KEY_MEMBERS, el.inputMembers.value);

  state.usedMembers.clear();
  state.usedDates.clear();

  state.logs = [];
  state.csvDownloaded = false;
  state.selectedMember = null;
  state.selectedDate = null;

  clearHighlights();
  stopAllAudio();

  setLocked(true);
  setSystem("READY_MEMBER");

  setResult("請抽值日生");
  setResultSub(
    state.mode === "auto"
      ? "自動：按自動開始或中斷"
      : "手動：按抽值日生"
  );

  el.chipAuto.textContent = "自動未執行";

  updateCounters();
  renderLogs();
  redrawAll(performance.now());
  updateButtons();
}

function unlockLists(){
  stopAllAudio();
  clearHighlights();

  state.csvDownloaded = false;
  setLocked(false);
  state.usedMembers.clear();
  state.usedDates.clear();
  state.selectedMember = null;
  state.selectedDate = null;

  setSystem("INIT");
  setResult("尚未開始");
  setResultSub("請先鎖定名單");

  updateButtons();
  updateCounters();
  redrawAll(performance.now());
}

function resetAll(){
  if(isBusy()) return;

  const msg =
    "資料紀錄將被清空(clear) & 歸零(reset)，\n" +
    "需重新輸入姓名並鎖定名單開始新轉盤遊戲！\n" +
    "您確定要執行嗎 (Yes or No)?";

  if(!confirm(msg)) return;

  stopAllAudio();
  clearHighlights();

  // 🔥 清除 localStorage
  localStorage.removeItem(LS_KEY_DATES);
  localStorage.removeItem(LS_KEY_MEMBERS);

  // 🔥 清空 state
  state.logs = [];
  state.csvDownloaded = false;
  state.selectedMember = null;
  state.selectedDate = null;

  state.members = [];
  state.dates = [];

  state.usedMembers.clear();
  state.usedDates.clear();
  
  // 🔥 重置輪盤狀態
  state.memberWheel.angle = 0;
  state.memberWheel.selectedIndex = -1;
  state.memberWheel.spin = null;

  state.dateWheel.angle = 0;
  state.dateWheel.selectedIndex = -1;
  state.dateWheel.spin = null;

  // 🔥 清空 textarea
  el.inputMembers.value = "";
  el.inputDates.value = "";

  // 🔥 更新右上角數字
  el.dateTotal.textContent = "0";

  // 🔥 回到 INIT
  setLocked(false);
  setSystem("INIT");
  setResult("尚未開始");
  setResultSub("請先輸入姓名並鎖定名單");

  el.chipAuto.textContent = "自動未執行";

  renderLogs();
  updateCounters();
  redrawAll(performance.now());
  updateButtons();
}



/** =========================
 *  日期解析與同步
 *  ========================= */

function parseDatesFromTextarea(text){
  return text
    .split(/\r?\n|,/)        // 支援換行或逗號
    .map(s => s.trim())
    .filter(Boolean);
}

function refreshDatesFromInput(){
  const dates = parseDatesFromTextarea(el.inputDates.value);

  state.dates = dates;

  // 🔥 這才是關鍵：更新右上角總數
  el.dateTotal.textContent = String(dates.length);

  // 如果還沒鎖定才更新輪盤
  if(!state.locked){
    redrawAll(performance.now());
  }

  updateCounters();
  updateButtons();
}

/** =========================
 *  事件綁定
 *  ========================= */
el.btnLock.onclick = lockLists;
el.btnUnlock.onclick = unlockLists;
el.btnReset.onclick = resetAll;

el.btnSpinMember.onclick = spinMember;
el.btnSpinDate.onclick = spinDate;

el.btnAutoStart.onclick = runAuto;
el.btnUnlockAudio.onclick = unlockAudio;

el.btnCsv.onclick = exportCsv;

el.inputDates.addEventListener("input", ()=>{
  if(state.locked) return;
  localStorage.setItem(LS_KEY_DATES, el.inputDates.value);
  refreshDatesFromInput();
});

el.inputMembers.addEventListener("input", ()=>{
  if(state.locked) return;
  localStorage.setItem(LS_KEY_MEMBERS, el.inputMembers.value);
});

// 模式切換（可中途，但忙碌/旋轉中禁止；切到 auto 不會自動開始，你選 B）
el.modeToggle.addEventListener("change", (e)=>{
  const t = e.target;
  if(!(t && t.name==="mode")) return;

  if(!canSwitchMode()){
    const radios = el.modeToggle.querySelectorAll('input[type="radio"]');
    radios.forEach(r => r.checked = (r.value === state.mode));
    setResultSub("旋轉中不可切換模式");
    return;
  }

  // ✅ 允許中途打斷自動：只要 AUTO_RUNNING 且切到手動，就立刻中止
  const nextMode = t.value;
  if(state.system === "AUTO_RUNNING" && nextMode === "manual"){
    abortAuto("已切換手動模式（中止自動）");
  }

  setMode(nextMode);

  // 切換模式後不自動開始（你選 B）
if(state.mode === "auto"){
  setResultSub("已切換自動模式：請按「自動開始或中斷」才會執行（自動靜音）");
}else{
  setResultSub("已切換手動模式：請按「抽值日生」→「抽日期」");
}
updateButtons();
});

/** =========================
 *  初始
 *  ========================= */
function init(){

  // 🔥 優先讀 localStorage
  const savedDates = localStorage.getItem(LS_KEY_DATES);
  const savedMembers = localStorage.getItem(LS_KEY_MEMBERS);

el.inputDates.value = savedDates ?? DUTY_DATES.join("\n");

  if(savedMembers){
    el.inputMembers.value = savedMembers;
  }

  setMode("manual");
  setLocked(false);

  ensureAudio();

  refreshDatesFromInput();   // 用 textarea 內容更新總數

  renderLogs();
  redrawAll(performance.now());

  if(!rafId) rafId = requestAnimationFrame(tick);
}
init();

</script>
</body>
</html>
